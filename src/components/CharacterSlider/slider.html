<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Portrait 3D Film Reel Slider (Absolute Zero Gap)</title>
  <style>
    /* 1. Reset and Fullscreen setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at center, #252525 0%, #0a0a0a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    /* 2. Pura Frame Container */
    .viewport-frame {
      position: relative;
      width: 100vw;
      height: 65vh; 
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2300px;
    }

    /* 3. The Metal Reel Unit */
    .film-reel-assembly {
      position: relative;
      width: 100vw; 
      height: 420px; 
      transform-style: preserve-3d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 4. Realistic Steel Plates */



    .top-plate {
      top: -240px; 
      transform: rotateX(84deg);
    }

    .bottom-plate {
      bottom: -240px;
      transform: rotateX(84deg);
    }

    /* 5. Carousel 3D Track - Strict Vertical Dimension */
    .carousel-3d-track {
      position: absolute;
      width: 240px; 
      height: 380px; 
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 5;
    }

    /* 6. Image Slides */
    .carousel-slide {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      backface-visibility: hidden;
      border-radius: 0px; 
      overflow: hidden;
      
      /* Tight seamless metal borders */
      border: 5px solid;
      border-image: linear-gradient(to right, #3a3a3a, #7a7a7a, #2a2a2a, #7a7a7a, #3a3a3a) 1;
      
      box-shadow: -4px 0 12px rgba(0,0,0,0.5), 4px 0 12px rgba(0,0,0,0.5);
      transform-origin: center center;
      transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.5s ease, filter 0.5s ease;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(25%) brightness(80%);
      transition: filter 0.3s;
    }

    /* Active dynamic states */
    .carousel-slide.is-active img {
      filter: grayscale(0%) brightness(105%);
    }

    .carousel-slide:hover img {
      filter: grayscale(0%) brightness(105%);
    }

    /* Reflections overlay */
    .carousel-slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
      z-index: 3;
      pointer-events: none;
    }

    /* 7. Controls Interface */
    .controls-wrapper {
      margin-bottom: 20px;
      display: flex;
      gap: 30px;
      z-index: 100;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 12px 30px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.2s, background 0.3s, border-color 0.3s;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-3px);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="viewport-frame">
    <div class="film-reel-assembly">

      <div class="carousel-3d-track" id="track">
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=1" alt="Vertical Shot 1"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=2" alt="Vertical Shot 2"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=3" alt="Vertical Shot 3"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=4" alt="Vertical Shot 4"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=5" alt="Vertical Shot 5"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=6" alt="Vertical Shot 6"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=7" alt="Vertical Shot 7"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=8" alt="Vertical Shot 8"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=9" alt="Vertical Shot 9"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/400/600?random=10" alt="Vertical Shot 10"></div>
      </div>

    </div>
  </div>

  <div class="controls-wrapper">
    <button class="nav-btn" id="prevBtn">← PREVIOUS</button>
    <button class="nav-btn" id="nextBtn">NEXT →</button>
  </div>

  <script>
    const track = document.getElementById('track');
    const slides = document.querySelectorAll('.carousel-slide');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    const totalSlides = slides.length;
    const degreeStep = 360 / totalSlides;

    // Radius tightened to 360px to force zero gaps on portrait elements
    const dynamicRadius = 360; 
    let currentRotationIndex = 0;

    function updateActiveState() {
      slides.forEach((slide, index) => {
        const targetAngle = index * degreeStep;
        let finalAngle = (targetAngle - (currentRotationIndex * degreeStep)) % 360;
        if (finalAngle < 0) finalAngle += 360;

        // Front active card selection
        if (Math.abs(finalAngle) < 10 || Math.abs(finalAngle - 360) < 10) {
          // Center portrait card pops out smoothly
          slide.style.transform = `rotateY(${targetAngle}deg) translateZ(${dynamicRadius + 35}px) scale(1.15)`;
          slide.style.opacity = "1";
          slide.style.zIndex = "10";
          slide.classList.add('is-active');
        } else {
          // Side vertical elements stick perfectly with 0.98 scale inside tight radius
          slide.style.transform = `rotateY(${targetAngle}deg) translateZ(${dynamicRadius}px) scale(0.98)`;
          slide.style.opacity = "0.55";
          slide.style.zIndex = "1";
          slide.classList.remove('is-active');
        }
      });
    }

    // Initialize layout
    updateActiveState();

    function rotateReel() {
      const activeAngle = -currentRotationIndex * degreeStep;
      track.style.transform = `rotateY(${activeAngle}deg)`;
      updateActiveState();
    }

    nextBtn.addEventListener('click', () => {
      currentRotationIndex++;
      rotateReel();
    });

    prevBtn.addEventListener('click', () => {
      currentRotationIndex--;
      rotateReel();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        currentRotationIndex++;
        rotateReel();
      } else if (e.key === 'ArrowLeft') {
        currentRotationIndex--;
        rotateReel();
      }
    });
  </script>
</body>
</html>
